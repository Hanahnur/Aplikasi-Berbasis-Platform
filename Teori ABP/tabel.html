<!DOCTYPE html>
<html>
<head>
    <title>Tabel Pendidikan</title>
    <style>
        table {
            border-collapse: collapse;
            width: 500px;
            text-align: center;
        }
        th, td {
            border: 2px solid black;
            padding: 8px;
        }
    </style>
</head>
<body>

<table>
    <tr>
        <th rowspan="2">Nama Lengkap</th>
        <th colspan="2">Gelar Pendidikan</th>
        <th rowspan="2">Age</th>
    </tr>
    <tr>
        <th>Sarjana</th>
        <th>Magister</th>
    </tr>
    <tr>
        <td>Budi</td>
        <td>S.Kom</td>
        <td>M.Sc</td>
        <td>35</td>
    </tr>
    <tr>
        <td>Andi</td>
        <td>S.SiKom</td>
        <td>M.T</td>
        <td>52</td>
    </tr>
</table>

</body>
</html>
