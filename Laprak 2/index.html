<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modul 5 Bootstrap</title>

    <!-- Pemanggilan Bootstrap dengan CDN -->

    <!-- CSS (FIX: hapus integrity & crossorigin) -->

          rel="stylesheet">
</head>

<body>

<div class="container mt-4">
    <h1 class="text-center">Tugas Modul 5 Bootstrap</h1>
     <div class="container mt-5">
        <h3>Bootstrap Grid</h3>

        <div class="row">
            <div class="col-12 col-md-8 bg-primary text-white">col-12 col-md-8</div>
            <div class="col-6 col-md-4 bg-success text-white">col-6 col-md-4</div>
        </div>

        <div class="row mt-2">
            <div class="col-6 col-md-4 bg-warning">col-6 col-md-4</div>
            <div class="col-6 col-md-4 bg-danger text-white">col-6 col-md-4</div>
            <div class="col-6 col-md-4 bg-info">col-6 col-md-4</div>
        </div>

        <div class="row mt-2">
            <div class="col-6 bg-secondary text-white">col-6</div>
            <div class="col-6 bg-dark text-white">col-6</div>
        </div>
    </div>

    <hr>

    <!-- Tabel Hover Style -->
    <table class="table table-hover">
        <thead>
            <tr>
                <th scope="col">#</th>
                <th scope="col">Nama Lengkap</th>
                <th scope="col">Asal Kota</th>
                <th scope="col">Umur</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th scope="row">1</th>
                <td>Budi Rojadi</td>
                <td>Semarang</td>
                <td>35 th</td>
            </tr>

            <tr>
                <th scope="row">2</th>
                <td>Yulia Santi</td>
                <td>Bekasi</td>
                <td>32</td>
            </tr>

            <tr>
                <th scope="row">3</th>
                <td>Fahri Abdilah</td>
                <td>Medan</td>
                <td>38 th</td>
            </tr>
        </tbody>
    </table>

    <hr>

    <!-- Image -->
    <div class="container">
        <h2>Thumbnail & Fluid</h2>

        <img src="https://picsum.photos/200" class="img-thumbnail" alt="Cinque Terre">
        <img src="https://picsum.photos/400" class="img-fluid" alt="Responsive image">
    </div>

</div>

<hr>
<div class="container">
    <h4>Button Styles</h4>

    <button type="button" class="btn btn-secondary">Secondary</button>
    <button type="button" class="btn btn-primary btn-lg">Primary</button>
    <button type="button" class="btn btn-success w-100">Success</button>

    <button type="button" class="btn btn-info btn-sm">Info</button>
    <button type="button" class="btn btn-warning">Warning</button>
    <button type="button" class="btn btn-danger">Danger</button>
    <button type="button" class="btn btn-link">Link</button>
</div>
<hr>
<div class="container">
    <h3>Horizontal Form</h3>

    <form action="/action_page.php">
        <div class="row mb-3">
            <label class="col-sm-2 col-form-label">Username:</label>
            <div class="col-sm-10">
                <input type="text" class="form-control" name="uname" placeholder="Enter username">
            </div>
        </div>

        <div class="row mb-3">
            <label class="col-sm-2 col-form-label">Password:</label>
            <div class="col-sm-10">
                <input type="password" class="form-control" name="pwd" placeholder="Enter password">
            </div>
        </div>

        <div class="row">
            <div class="col-sm-10 offset-sm-2">
                <button type="submit" class="btn btn-success">Submit</button>
            </div>
        </div>
    </form>
</div>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.7.0.min.js"

        crossorigin="anonymous"></script>

</body>
</html>
